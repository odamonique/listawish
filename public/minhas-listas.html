<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/app.css">

    <title>Minhas Listas</title>
</head>
<body>
    <div id="navbar"></div>
    <main class="container dashboard-page">

        <section class="dashboard-header">

            <div>
                <span class="badge">Suas listas personalizadas</span>

                <h1>Minhas Listas</h1>

                <p>Organize aniversários, casamentos e momentos especiais.</p>
            </div>

            <button onclick="logout()" class="btn-outline">Sair</button>

        </section>

        <section id="formCard" class="card create-list-card">

            <div class="section-title">
                <h3 id="formTitle">Criar Nova Lista</h3>
                <p id="formSubtitle">Crie uma nova lista compartilhável.</p>
            </div>

            <form id="formLista" class="form-grid">
                <input type="text" id="titulo" placeholder="Título da lista" required>
                <input type="text" id="descricao" placeholder="Descrição">
                <input type="text" id="dataExpiracao" placeholder="Data de expiração" required>
                <button type="submit" id="btnSubmit">Criar Lista</button>
            </form>

        </section>

        <section class="listas-section">

            <div class="section-title">
                <h3>Suas Listas</h3>
                <p>Gerencie e compartilhe suas listas.</p>
            </div>

            <div id="listas" class="listas-grid"></div>

        </section>

    </main>
    <div id="footer"></div>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/listas.js"></script>
</body>
</html>
