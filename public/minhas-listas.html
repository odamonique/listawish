<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/app.css">
    
    <title>Minhas Listas</title>
</head>
<body>
    <div id="navbar"></div>
    <div class="container">
        <h2 id="inicial">Minhas Listas</h2>

        <!-- <button onclick="logout()">Sair</button> -->

        <h3>Criar Nova Lista</h3>

        <form id="formLista">
            <input type="text" id="titulo" placeholder="Título" required><br>
            <input type="text" id="descricao" placeholder="Descrição"><br>
            <input type="text" id="dataExpiracao" placeholder="Data de expiração" required><br>
            <button type="submit" id="btnSubmit">Criar</button>
        </form>

        <h3>Suas Listas</h3>

        <div id="listas"></div>
        <button onclick="logout()">Sair</button>
    </div>
    <div id="footer"></div>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/listas.js"></script>
</body>
</html>
