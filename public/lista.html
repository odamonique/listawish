<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/app.css">
    <title>Lista</title>
</head>
<body>
    <div class="container">
    <div class="topo">
        <h2 id="tituloLista">Itens da Lista</h2> 
        <button onclick="voltar()" class="btn-voltar">Voltar</button>
    </div>


        <h3>Adicionar Item</h3>

        <form id="formItem">
            <input type="text" id="nome" placeholder="Nome do item" required><br>
            <input type="text" id="url" placeholder="URL"><br>
            <button type="submit">Adicionar</button>
        </form>

        <h3>Itens</h3>

        <div id="itens"></div>
    </div>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/itens.js"></script>
</body>
</html>
