<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/app.css">

    <title>Lista</title>
</head>
<body>
    <div id="navbar"></div>
    <main class="container lista-page">

        <section class="lista-header">
            <div>
                <span class="badge">Organize seus presentes</span>

                <h1 id="tituloLista">Itens da Lista</h1>

                <p>Seus presentes em um só lugar.</p>
            </div>
            <button onclick="voltar()" class="btn-outline">Finalizar</button>
        </section>

        <section class="card">

            <div class="section-title">
                <h3>Adicionar Item</h3>
                <p>Adicione presentes à sua lista.</p>
            </div>

            <form id="formItem" class="form-grid">
                <input type="text" id="nome" placeholder="Nome do item" required>
                <input type="text" id="url" placeholder="URL do produto">                
                <button type="submit">Adicionar Item</button>
            </form>

        </section>

        <section>
            <div class="section-title">
                <h3>Itens da Lista</h3>
                <p>Acompanhe os presentes adicionados.</p>
            </div>
            <div id="itens" class="itens-grid"></div>
        </section>

    </main>
    <div id="footer"></div>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/itens.js"></script>
</body>
</html>
