<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/app.css">
    
    <title>Lista</title>
</head>
<body>
    <div id="navbar"></div>
    <div class="container">
    <div class="topo">
        <h2 id="tituloLista">Itens da Lista</h2> 
        <button onclick="voltar()" class="btn-voltar">Finalizar</button>
    </div>


        <h3>Adicionar Item</h3>

        <form id="formItem">
            <input type="text" id="nome" placeholder="Nome do item" required><br>
            <input type="text" id="url" placeholder="URL"><br>
            <button type="submit">Adicionar</button>
        </form>

        <h3>Itens</h3>

        <div id="itens"></div>
    </div>
    <div id="footer"></div>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/itens.js"></script>
</body>
</html>
