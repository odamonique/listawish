<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="password" id="senha" placeholder="Senha" required><br>
        <button type="submit">Entrar</button>
    </form>

    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script>
        //Captura o envio do formulário
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            //Evita que a pagina recarregue
            e.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            try {
                //Chama função de requisição 
                const data = await apiRequest("/usuarios/login", "POST", {
                    email, senha
                });
                //Salva o token retornado no localStorage
                localStorage.setItem("token", data.token);

                //Redireciona para a página de listas
                window.location.href = "minhas-listas.html";
                
            } catch (error) {
                //Mostra mensagem de erro 
                toast(error.message);
            }
        });
    </script>
</body>
</html>
