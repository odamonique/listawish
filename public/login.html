<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins e Lora-->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">

    <title>Login</title>
</head>
<body>
    <div id="navbar"></div>
    <main class="auth-page">

        <div class="auth-card">

            <div class="auth-header">
                <img src="/assets/logo.png" alt="ListaWish" class="auth-logo">
                <h2>Bem-vindo de volta</h2>

                <p>Entre na sua conta para acessar suas listas.</p>
            </div>

            <form id="loginForm" class="auth-form">
                <input type="email" id="email" placeholder="Seu email" required>
                <input type="password" id="senha" placeholder="Sua senha" required>
                <button type="submit">Entrar</button>
            </form>

            <div class="auth-footer">
                <p>Ainda não possui conta?<a href="cadastro.html"> Criar conta</a></p>
            </div>

        </div>

    </main>

    <div id="footer"></div>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script>
        //Captura o envio do formulário
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            //Evita que a pagina recarregue
            e.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            try {
                //Chama função de requisição 
                const data = await apiRequest("/usuarios/login", "POST", {
                    email, senha
                });
                //Salva o token retornado no localStorage
                localStorage.setItem("token", data.token);

                //Redireciona para a página de listas
                window.location.href = "minhas-listas.html";
                
            } catch (error) {
                //Mostra mensagem de erro 
                toast(error.message);
            }
        });
    </script>
</body>
</html>
