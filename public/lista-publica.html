<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/app.css">

    <title>Lista Pública</title>
</head>
<body>
    <main class="public-page">

        <section class="public-hero">

            <div class="public-logo">
                <img src="/assets/logo.png" alt="ListaWish">
                <span>ListaWish</span>
            </div>

            <div class="public-hero-content">

                <div class="public-text">
                    <h1 id="titulo"></h1>
                    <p id="descricao"></p>
                    <small id="dataExpiracao"></small>
                </div>

                <div class="public-image">
                    <img src="/assets/gift-hero.png" alt="Gift">
                </div>

            </div>

        </section>

        <section class="public-list-section">

            <div class="section-title">
                <h2>Presentes</h2>
                <p>Escolha um presente e marque como comprado.</p>
            </div>

            <div id="itens" class="public-itens-grid"></div>

        </section>

    </main>

    <script src="/js/components.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script src="js/publica.js"></script>
</body>
</html>
