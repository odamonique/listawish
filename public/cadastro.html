<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Melhora performance da fonte-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--Fonte Poppins-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
    rel="stylesheet">
    <!--CSS do projeto-->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">

    <title>Cadastro</title>
</head>
<body>
    <div id="navbar"></div>
    <main class="auth-page">

        <div class="auth-card">

            <div class="auth-header">
                <img src="/assets/logo.png" alt="ListaWish" class="auth-logo">

                <h2>Criar conta</h2>

                <p>Organize presentes de forma simples e elegante.</p>
            </div>

            <form id="cadastroForm" class="auth-form">
                <input type="text" id="nome" placeholder="Seu nome" required>
                <input type="email" id="email" placeholder="Seu email" required>
                <input type="password" id="senha" placeholder="Crie uma senha"required>
                <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
                <button type="submit">Criar conta</button>
            </form>

            <div class="auth-footer">
                <p>Já possui conta? <a href="login.html">Fazer login</a></p>
            </div>

        </div>

    </main>

    <div id="footer"></div>

        <script src="/js/components.js"></script>
        <script src="js/toast.js"></script>
        <script src="js/api.js"></script>
        <script>
            //Captura o envio do formulario 
            document.getElementById("cadastroForm").addEventListener(
                "submit", async (e) => {
                    //Evita que a pagina recarregue
                    e.preventDefault();

                    const nome = document.getElementById("nome").value;
                    const email = document.getElementById("email").value;
                    const senha = document.getElementById("senha").value;
                    const confirmarSenha = document.getElementById("confirmarSenha").value;

                    if (senha !== confirmarSenha) {
                        toast("As senhas devem ser iguais");
                        return;
                    }

                    try {
                        //Chama função de requisição 
                        await apiRequest("/usuarios/registro", "POST", {
                            nome, email, senha
                        });
                        //Redireciona para a página de login
                        window.location.href = "login.html";

                    } catch (error) {
                        //Mostra mensagem de erro 
                        toast(error.message);
                    }
                }
            )
        </script>
</body>
</html>
